default_install_hook_types:
  - pre-commit
default_stages:
  - pre-commit  # Run locally on git commit
  - manual       # Run in CI via pre-commit/action with --hook-stage manual

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff-check
        args: [--output-format, github, --fix]
      - id: ruff-format
    # The format-sweep commit that preceded this hook enable is recorded
    # in .git-blame-ignore-revs (added in a follow-up commit post-merge
    # because rebase-merge rewrites SHAs and the file needs the final one).
    # Both local `git blame --ignore-revs-file=...` and GitHub's blame
    # view honor the file so historical authorship survives the sweep.

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$
